<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFIX Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--surface:#0d0d14;--surface2:#13131e;
  --border:#1e1e2e;--border2:#2a2a40;
  --yellow:#f5c800;--green:#00ff9d;--red:#ff3860;
  --text:#e8e8f0;--muted:#4a4a6a;--muted2:#6b6b8a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(245,200,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,200,0,.025) 1px,transparent 1px);background-size:60px 60px}
.glow-orb{position:fixed;top:-300px;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse,rgba(245,200,0,.06) 0%,transparent 65%);pointer-events:none;z-index:0;animation:orbPulse 6s ease-in-out infinite}
@keyframes orbPulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 32px;border-bottom:1px solid var(--border2);background:rgba(5,5,8,.9);backdrop-filter:blur(20px);position:relative;z-index:100}
.nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--yellow),transparent)}
.nav-logo img{height:46px;filter:drop-shadow(0 0 8px rgba(245,200,0,.4))}
.nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--yellow);letter-spacing:4px;text-shadow:0 0 20px rgba(245,200,0,.5)}
.nav-clock{font-family:'Share Tech Mono',monospace;font-size:30px;color:var(--yellow);letter-spacing:3px;text-shadow:0 0 15px rgba(245,200,0,.6);text-align:center}
.nav-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-top:2px;text-align:center}
.nav-status{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:2px;text-align:right}
.nav-status span{color:var(--green);text-shadow:0 0 8px var(--green)}

/* LOGIN OUTER */
.login-outer{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:5;padding:32px 16px}

/* BOX */
.login-box{
  width:100%;max-width:420px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.6),0 0 0 1px rgba(245,200,0,.04);
  animation:boxIn .5s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--yellow),transparent);
}
@keyframes boxIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* HEADER */
.login-header{
  background:var(--surface2);border-bottom:1px solid var(--border2);
  padding:28px 32px 24px;text-align:center;
}
.login-icon{
  width:56px;height:56px;
  background:rgba(245,200,0,.06);border:1px solid rgba(245,200,0,.2);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:6px;color:var(--yellow);line-height:1;text-shadow:0 0 20px rgba(245,200,0,.3)}
.login-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:3px;text-transform:uppercase;margin-top:6px}

/* FORM */
.login-form{padding:28px 32px}
.field{margin-bottom:18px}
.field-label{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;display:block}
.field-wrap{position:relative}
.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.field input{
  width:100%;padding:13px 14px 13px 44px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;
  transition:border-color .2s,box-shadow .2s;outline:none;letter-spacing:.5px;
}
.field input::placeholder{color:var(--muted);font-weight:400}
.field input:focus{border-color:rgba(245,200,0,.4);box-shadow:0 0 0 3px rgba(245,200,0,.08)}
.field input.error{border-color:rgba(255,56,96,.5);box-shadow:0 0 0 3px rgba(255,56,96,.08);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted2);transition:color .2s;padding:4px}
.eye-btn:hover{color:var(--yellow)}

/* ERROR */
.err-msg{display:none;background:rgba(255,56,96,.06);border:1px solid rgba(255,56,96,.2);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;font-weight:700;margin-bottom:16px;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;letter-spacing:.5px}
.err-msg.show{display:flex}

/* BUTTON */
.btn-login{
  width:100%;padding:15px;
  background:var(--yellow);border:none;border-radius:8px;
  color:#000;font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:6px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;margin-top:4px;
  box-shadow:0 4px 20px rgba(245,200,0,.2);
}
.btn-login:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 6px 28px rgba(245,200,0,.3)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.login-footer{padding:14px 32px 20px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;border-top:1px solid var(--border);text-transform:uppercase}
.login-footer span{color:var(--yellow)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="glow-orb"></div>

<nav class="nav">
  <div class="nav-logo">
    <img src="ufix_logo.png?v=2" alt="UFIX" onerror="this.style.display='none';document.querySelector('.nav-logo-text').style.display='block'">
    <span class="nav-logo-text" style="display:none">UFIX</span>
  </div>
  <div>
    <div class="nav-clock" id="clock">00:00:00</div>
    <div class="nav-date" id="navDate">—</div>
  </div>
  <div class="nav-status">SYSTEM<br><span>ONLINE</span></div>
</nav>

<div class="login-outer">
  <div class="login-box">
    <div class="login-header">
      <div class="login-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--yellow)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="login-title">SIGN IN</div>
      <div class="login-sub">UFIX Attendance System</div>
    </div>

    <div class="login-form">
      <div class="err-msg" id="errMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errText">Invalid username or password</span>
      </div>

      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <span class="field-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
          <button class="eye-btn" onclick="toggleEye()" id="eyeBtn">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="login()">LOGIN</button>
    </div>

    <div class="login-footer">UFIX HR · Attendance Portal · <span>v2.0</span></div>
  </div>
</div>

<script>
if(localStorage.getItem('ufix_auth')==='1') window.location.href='index.html';

const CREDS={username:"ufix710@gmail.com",password:"yusuf1414ufixhr"};
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toTimeString().slice(0,8);
  document.getElementById('navDate').textContent=DAYS[n.getDay()]+' · '+n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
}
setInterval(updateClock,1000); updateClock();

function toggleEye(){
  const inp=document.getElementById('password'),icon=document.getElementById('eyeIcon');
  if(inp.type==='password'){inp.type='text';icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{inp.type='password';icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}

function login(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('errMsg');
  err.classList.remove('show');
  document.getElementById('username').classList.remove('error');
  document.getElementById('password').classList.remove('error');
  if(!u||!p){
    document.getElementById('errText').textContent='Please fill in all fields';
    err.classList.add('show');
    if(!u)document.getElementById('username').classList.add('error');
    if(!p)document.getElementById('password').classList.add('error');
    return;
  }
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>';
  setTimeout(()=>{
    if(u===CREDS.username&&p===CREDS.password){
      localStorage.setItem('ufix_auth','1');
      btn.innerHTML='✓ ACCESS GRANTED';
      btn.style.background='var(--green)';
      setTimeout(()=>window.location.href='index.html',700);
    }else{
      btn.disabled=false;btn.innerHTML='LOGIN';
      document.getElementById('errText').textContent='Invalid username or password';
      err.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
      document.getElementById('password').value='';
      document.getElementById('password').focus();
    }
  },600);
}
window.onload=()=>document.getElementById('username').focus();
</script>
</body>
</html>
